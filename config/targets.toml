[[targets]]
name = "x86_64-unknown-linux-gnu"
os = "ubuntu-latest"
enabled = true
env = { CC = "gcc", CXX = "g++", LD = "gcc", AS = "as" }
configure = [
  "--arch=x86_64",
  "--target-os=linux",
  "--cc=gcc",
  "--cxx=g++",
  "--ld=gcc",
  "--as=as",
]
extra_cflags = ""
extra_ldflags = ""

[[targets]]
name = "aarch64-apple-darwin"
os = "macos-latest"
enabled = true
env = { CC = "clang", CXX = "clang++" }
configure = ["--arch=arm64", "--target-os=darwin"]
extra_cflags = "-arch arm64"
extra_ldflags = "-arch arm64"

[[targets]]
name = "aarch64-apple-ios"
os = "macos-latest"
enabled = true
note = "Requires Xcode and iOS SDK."
env = { CC = "xcrun -sdk iphoneos clang", CXX = "xcrun -sdk iphoneos clang++", AS = "xcrun -sdk iphoneos clang", IOS_SDK = "/Applications/Xcode.app/Contents/Developer/Platforms/iPhoneOS.platform/Developer/SDKs/iPhoneOS.sdk" }
configure = [
  "--arch=arm64",
  "--target-os=darwin",
  "--enable-cross-compile",
  "--cc=${CC}",
  "--cxx=${CXX}",
  "--as=${CC}",
  "--ld=${CC}",
]
extra_configure = ["--disable-videotoolbox", "--sysroot=${IOS_SDK}"]
extra_cflags = "-isysroot ${IOS_SDK} -miphoneos-version-min=9.0"
extra_ldflags = "-isysroot ${IOS_SDK} -miphoneos-version-min=9.0"

[[targets]]
name = "aarch64-apple-ios-sim"
os = "macos-latest"
enabled = true
note = "Requires Xcode and iOS simulator SDK."
env = { CC = "xcrun -sdk iphonesimulator clang", CXX = "xcrun -sdk iphonesimulator clang++", AS = "xcrun -sdk iphonesimulator clang", IOS_SIM_SDK = "/Applications/Xcode.app/Contents/Developer/Platforms/iPhoneSimulator.platform/Developer/SDKs/iPhoneSimulator.sdk" }
configure = [
  "--arch=arm64",
  "--target-os=darwin",
  "--enable-cross-compile",
  "--cc=${CC}",
  "--cxx=${CXX}",
  "--as=${CC}",
  "--ld=${CC}",
  "--disable-videotoolbox",
]
extra_configure = ["--disable-videotoolbox", "--sysroot=${IOS_SIM_SDK}"]
extra_cflags = "-isysroot ${IOS_SIM_SDK} -mios-simulator-version-min=9.0"
extra_ldflags = "-isysroot ${IOS_SIM_SDK} -mios-simulator-version-min=9.0"

[[targets]]
name = "aarch64-unknown-linux-ohos"
os = "ubuntu-latest"
enabled = true
note = "Requires OpenHarmony SDK; set OHOS_SDK if not at the default path."
env = { CPU_MARCH = "armv8-a" }
configure = [
  "--arch=aarch64",
  "--target-os=linux",
  "--cpu=armv8-a",
  "--enable-cross-compile",
  "--enable-static",
  "--disable-htmlpages",
  "--disable-optimizations",
  "--disable-asm",
  "--disable-x86asm",
  "--disable-stripping",
  "--cc=${OHOS_SDK}/native/llvm/bin/clang",
  "--ld=${OHOS_SDK}/native/llvm/bin/clang",
  "--ar=${OHOS_SDK}/native/llvm/bin/llvm-ar",
  "--strip=${OHOS_SDK}/native/llvm/bin/llvm-strip",
  "--extra-cflags=--target=aarch64-linux-ohos --sysroot=${OHOS_SDK}/native/sysroot -D__MUSL__ -march=${CPU_MARCH} -Os -fPIC",
  "--extra-ldflags=--target=aarch64-linux-ohos --sysroot=${OHOS_SDK}/native/sysroot -fuse-ld=lld",
]
extra_cflags = ""
extra_ldflags = ""

[[targets]]
name = "x86_64-pc-windows-gnu"
os = "ubuntu-latest"
enabled = true
note = "Requires mingw-w64 toolchain and cross-prefix."
configure = [
  "--arch=x86_64",
  "--target-os=mingw64",
  "--enable-cross-compile",
  "--cross-prefix=x86_64-w64-mingw32-",
]
extra_cflags = ""
extra_ldflags = ""

[[targets]]
name = "aarch64-pc-windows-gnullvm"
os = "ubuntu-latest"
enabled = true
note = "Requires MSVC toolchain configured for arm64."
configure = [
  "--arch=aarch64",
  "--target-os=mingw64",
  "--enable-cross-compile",
  "--cross-prefix=aarch64-w64-mingw32-",
]
extra_cflags = ""
extra_ldflags = ""

[[targets]]
name = "x86_64-pc-windows-msvc"
os = "windows-latest"
enabled = true
note = "Requires MSVC toolchain and FFmpeg msvc flags."
configure = ["--arch=x86_64", "--target-os=win64", "--toolchain=msvc"]
extra_cflags = ""
extra_ldflags = ""

[[targets]]
name = "aarch64-pc-windows-msvc"
os = "windows-latest"
enabled = true
note = "Requires MSVC toolchain configured for arm64."
configure = [
  "--arch=aarch64",
  "--target-os=win64",
  "--toolchain=msvc",
  "--enable-cross-compile",
]
extra_cflags = ""
extra_ldflags = ""

[[targets]]
name = "aarch64-linux-android"
os = "ubuntu-latest"
enabled = true
note = "Requires Android NDK and API level configuration."
configure = [
  "--arch=arm64",
  "--target-os=android",
  "--enable-cross-compile",
  "--cc=${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang",
  "--cxx=${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang++",
  "--ar=${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar",
  "--ranlib=${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ranlib",
]
extra_cflags = ""
extra_ldflags = ""

[[targets]]
name = "armv7-linux-androideabi"
os = "ubuntu-latest"
enabled = true
note = "Requires Android NDK and API level configuration."
configure = [
  "--arch=armv7",
  "--target-os=android",
  "--enable-cross-compile",
  "--cc=${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi21-clang",
  "--cxx=${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi21-clang++",
  "--ar=${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar",
  "--ranlib=${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ranlib",
]
extra_cflags = ""
extra_ldflags = ""
