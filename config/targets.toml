[[targets]]
name = "x86_64-unknown-linux-gnu"
os = "ubuntu-latest"
enabled = true
env = { CC = "gcc", CXX = "g++" }
configure = ["--arch=x86_64", "--target-os=linux", "--cc=gcc", "--cxx=g++", "--ld=gcc"]
extra_cflags = ""
extra_ldflags = ""

[[targets]]
name = "aarch64-apple-darwin"
os = "macos-latest"
enabled = true
env = { CC = "clang", CXX = "clang++" }
configure = ["--arch=arm64", "--target-os=darwin"]
extra_cflags = "-arch arm64"
extra_ldflags = "-arch arm64"

[[targets]]
name = "aarch64-apple-ios"
os = "macos-latest"
enabled = true
note = "Requires Xcode and iOS SDK."
env = { CC = "xcrun -sdk iphoneos clang", CXX = "xcrun -sdk iphoneos clang++" }
configure = ["--arch=arm64", "--target-os=darwin", "--enable-cross-compile"]
extra_configure = ["--disable-libvorbis", "--disable-decoder=libvorbis"]
extra_cflags = "-miphoneos-version-min=9.0"
extra_ldflags = "-miphoneos-version-min=9.0"

[[targets]]
name = "aarch64-apple-ios-sim"
os = "macos-latest"
enabled = true
note = "Requires Xcode and iOS simulator SDK."
env = { CC = "xcrun -sdk iphonesimulator clang", CXX = "xcrun -sdk iphonesimulator clang++" }
configure = [
  "--arch=arm64",
  "--target-os=darwin",
  "--enable-cross-compile",
  "--disable-videotoolbox",
]
extra_configure = ["--disable-libvorbis", "--disable-decoder=libvorbis"]
extra_cflags = "-mios-simulator-version-min=9.0"
extra_ldflags = "-mios-simulator-version-min=9.0"

[[targets]]
name = "aarch64-unknown-linux-ohos"
os = "ubuntu-latest"
enabled = false
note = "Requires OpenHarmony SDK; set OHOS_SDK if not at the default path."
env = { OHOS_SDK = "/ohos_sdk/command-line-tools/sdk/default/openharmony", CPU_MARCH = "armv8-a", CC = "${OHOS_SDK}/native/llvm/bin/aarch64-linux-ohos-clang", LD = "${OHOS_SDK}/native/llvm/bin/aarch64-linux-ohos-clang", STRIP = "${OHOS_SDK}/native/llvm/bin/llvm-strip" }
configure = [
  "--arch=aarch64",
  "--target-os=linux",
  "--cpu=armv8-a",
  "--enable-cross-compile",
  "--enable-static",
  "--disable-htmlpages",
  "--disable-optimizations",
  "--disable-asm",
  "--disable-x86asm",
  "--disable-stripping",
  "--cc=${OHOS_SDK}/native/llvm/bin/aarch64-linux-ohos-clang",
  "--ld=${OHOS_SDK}/native/llvm/bin/aarch64-linux-ohos-clang",
  "--strip=${OHOS_SDK}/native/llvm/bin/llvm-strip",
  "--sysroot=${OHOS_SDK}/native/sysroot",
  "--cross-prefix=${OHOS_SDK}/native/llvm/bin/aarch64-linux-ohos-",
]
extra_cflags = "-march=${CPU_MARCH} -Os -fpic"
extra_ldflags = ""

[[targets]]
name = "x86_64-pc-windows-gnu"
os = "ubuntu-latest"
enabled = false
note = "Requires mingw-w64 toolchain and cross-prefix."
configure = [
  "--arch=x86_64",
  "--target-os=mingw64",
  "--enable-cross-compile",
  "--cross-prefix=x86_64-w64-mingw32-",
]
extra_cflags = ""
extra_ldflags = ""

[[targets]]
name = "x86_64-pc-windows-msvc"
os = "windows-latest"
enabled = false
note = "Requires MSVC toolchain and FFmpeg msvc flags."
configure = ["--arch=x86_64", "--target-os=win64", "--toolchain=msvc"]
package_libs = ["avcodec.lib", "avformat.lib", "avutil.lib", "swresample.lib", "swscale.lib"]
extra_cflags = ""
extra_ldflags = ""

[[targets]]
name = "aarch64-linux-android"
os = "ubuntu-latest"
enabled = false
note = "Requires Android NDK and API level configuration."
configure = ["--arch=arm64", "--target-os=android", "--enable-cross-compile"]
extra_cflags = ""
extra_ldflags = ""

[[targets]]
name = "armv7-linux-androideabi"
os = "ubuntu-latest"
enabled = false
note = "Requires Android NDK and API level configuration."
configure = ["--arch=armv7", "--target-os=android", "--enable-cross-compile"]
extra_cflags = ""
extra_ldflags = ""
