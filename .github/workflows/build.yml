name: build-ffmpeg

on:
  workflow_dispatch:
  pull_request:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - id: gen
        name: Generate matrix
        run: |
          python3 scripts/gen-matrix.py > matrix.json
          echo "matrix=$(cat matrix.json)" >> "$GITHUB_OUTPUT"

  build:
    needs: matrix
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build deps (ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm yasm libvorbis-dev pkg-config mingw-w64

      - name: Install musl tools
        if: runner.os == 'Linux' && contains(matrix.target, 'musl')
        run: sudo apt-get install -y musl-tools

      - name: Install aarch64 musl toolchain
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          curl -L https://toolchains.bootlin.com/downloads/releases/toolchains/aarch64/tarballs/aarch64--musl--stable-2025.08-1.tar.xz | tar -xJ -C /tmp --strip-components=1
          echo "/tmp/bin" >> "$GITHUB_PATH"

      - name: Install build deps (macos)
        if: runner.os == 'macOS'
        run: |
          brew install pkg-config libvorbis

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows' && contains(matrix.target, 'msvc')
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ contains(matrix.target, 'aarch64') && 'amd64_arm64' || 'amd64' }}

      - name: Setup MSYS2 (Windows)
        if: runner.os == 'Windows' && contains(matrix.target, 'msvc')
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: make pkg-config diffutils yasm perl gawk
          path-type: inherit

      - name: Install gas-preprocessor for ARM64 MSVC
        if: runner.os == 'Windows' && contains(matrix.target, 'aarch64') && contains(matrix.target, 'msvc')
        shell: msys2 {0}
        run: |
          curl -L https://raw.githubusercontent.com/FFmpeg/gas-preprocessor/master/gas-preprocessor.pl -o /usr/bin/gas-preprocessor.pl
          chmod +x /usr/bin/gas-preprocessor.pl

      - name: Setup llvm-mingw
        if: runner.os == 'Linux' && contains(matrix.target, 'gnullvm')
        run: |
          curl -L https://github.com/mstorsjo/llvm-mingw/releases/download/20260324/llvm-mingw-20260324-ucrt-ubuntu-22.04-x86_64.tar.xz | tar -xJC /tmp
          echo "/tmp/llvm-mingw-20260324-ucrt-ubuntu-22.04-x86_64/bin" >> "$GITHUB_PATH"

      - name: Select Xcode (iOS targets)
        if: runner.os == 'macOS' && (matrix.target == 'aarch64-apple-ios' || matrix.target == 'aarch64-apple-ios-sim')
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-path
          xcrun --sdk iphonesimulator --show-sdk-path

      - name: Setup OpenHarmony SDK
        if: contains(matrix.target, 'ohos')
        uses: openharmony-rs/setup-ohos-sdk@v0.2
        with:
          version: '6.0'
          components: 'native'

      - name: Set OHOS_SDK env
        if: contains(matrix.target, 'ohos')
        run: echo "OHOS_SDK=$OHOS_BASE_SDK_HOME" >> "$GITHUB_ENV"

      - name: Build FFmpeg (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: python3 scripts/build-ffmpeg.py ${{ matrix.target }}

      - name: Build FFmpeg (Unix)
        if: runner.os != 'Windows'
        run: python3 scripts/build-ffmpeg.py ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}.tar.gz
          path: dist/${{ matrix.target }}.tar.gz

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.target }}.tar.gz
